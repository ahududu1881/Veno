# ╔══════════════════════════════════════════════════════════╗
# ║   VENO V3.0 — app.toml | Uygulama Yapılandırması        ║
# ╚══════════════════════════════════════════════════════════╝

[server]
  name        = "test"
  version     = "1.0.0"
  environment = "production"
  log_level   = "info"

  [[server.listener]]
    id           = "main"
    port         = 8080
    domain       = "localhost"
    folder       = "public"
    error_folder = "errors"
    privacy      = "any"         # any | local
    gzip         = true

  # İkinci sunucu örneği:
  # [[server.listener]]
  #   id = "admin"
  #   port = 8081
  #   domain = "localhost"
  #   folder = "public"
  #   privacy = "local"
  #   gzip = true

  [server.tls]
    enabled     = false
    cert_file   = "certs/server.crt"
    key_file    = "certs/server.key"
    min_version = "1.3"

  [server.timeouts]
    read  = 30
    write = 30
    idle  = 120
    drain = 15

[cache]
  enabled       = true
  max_entries   = 20000
  max_memory_mb = 128

[memory]
  gc_threshold_mb = 512
